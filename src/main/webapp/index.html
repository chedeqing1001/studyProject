<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script type="text/javascript">
        function printBox(){
            alert(document.getElementById("box").value);
        }
    </script>
</head>
<body>
    <input type="text" name="box" id="box" value="this is box">
    <input type="submit" onclick="printBox()" value="点击">
</body>
</html>
